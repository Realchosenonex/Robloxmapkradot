<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robloxmapkradot - Secure Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: radial-gradient(circle at 50% -15%, #1a1b3a 0%, #050505 85%);
            --card-bg: #111111;
            --primary: #6366f1;
            --secondary: #08d9d6;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
        }
        body { background: var(--bg-body); color: var(--text-main); font-family: 'Kanit', sans-serif; margin: 0; min-height: 100vh; padding-bottom: 50px; user-select: none; }
        
        header { text-align: center; padding: 80px 20px 40px; }
        .main-title { font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; text-transform: uppercase; letter-spacing: 4px; text-shadow: 0 0 20px rgba(99,102,241,0.5); }
        .sub-title { color: var(--text-dim); font-size: 1rem; letter-spacing: 2px; margin-top: 10px; font-weight: 300; }

        /* UI ปุ่มเข้าสู่ระบบ */
        .admin-trigger { position: fixed; bottom: 25px; left: 25px; width: 45px; height: 45px; background: rgba(255,255,255,0.1); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; z-index: 1000; }

        /* Login Modal UI */
        .modal-overlay { display: flex; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); padding: 40px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; border: 1px solid var(--primary); box-shadow: 0 0 50px rgba(99,102,241,0.3); }
        .login-card h2 { font-family: 'Orbitron'; margin-bottom: 25px; color: var(--primary); }

        /* Admin Form UI */
        #adminPanel { display: none; background: var(--card-bg); max-width: 550px; margin: 0 auto 40px; padding: 25px; border-radius: 20px; border: 1px solid var(--primary); }
        .admin-input { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 12px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; color: white; font-family: 'Kanit'; }
        .admin-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; }

        /* Card & Grid */
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; display: flex; align-items: center; border: 1px solid #222; position: relative; transition: 0.3s; }
        .avatar { width: 85px; height: 85px; border-radius: 18px; object-fit: cover; margin-right: 20px; border: 2px solid #333; }
        .info { flex: 1; }
        .name { font-weight: 600; font-size: 1.25rem; margin-bottom: 5px; }
        .badge { padding: 4px 12px; border-radius: 8px; font-size: 0.75rem; background: #222; color: var(--text-dim); }

        .action-group { display: flex; flex-direction: column; gap: 8px; }
        .icon-btn { width: 38px; height: 38px; border-radius: 12px; display: none; align-items: center; justify-content: center; border: none; cursor: pointer; color: white; text-decoration: none; }
        .fb-link { background: #1877f2; display: flex; }
        .edit-btn { background: #f1c40f; }
        .del-btn { background: #ff4757; }
        
        #loader { text-align: center; padding: 50px; font-size: 1.5rem; color: var(--primary); }
    </style>
</head>
<body oncontextmenu="return false;">

    <button class="admin-trigger" onclick="showLogin()"><i class="fas fa-lock"></i></button>

    <div class="modal-overlay" id="loginModal">
        <div class="login-card">
            <h2>MEMBER ACCESS</h2>
            <input type="password" id="passInput" class="admin-input" placeholder="กรุณาใส่รหัสผ่าน..." style="text-align: center; font-size: 1.2rem;">
            <button class="admin-btn" onclick="checkAuth()">ยืนยันตัวตน</button>
            <p id="loginError" style="color:#ff4757; margin-top:15px; display:none; font-size:0.9rem;">รหัสผ่านไม่ถูกต้อง!</p>
        </div>
    </div>

    <header>
        <h1 class="main-title">Member List</h1>
        <div class="sub-title">ROBLOXMAPKRADOT DATABASE</div>
    </header>

    <div id="adminPanel">
        <div id="formTitle" style="font-weight:bold; color:var(--primary); margin-bottom:15px; text-align:center;">เพิ่มชื่อใหม่</div>
        <input type="text" id="addName" class="admin-input" placeholder="ชื่อเล่น">
        <input type="text" id="addGang" class="admin-input" placeholder="แก๊ง">
        <input type="text" id="addRole" class="admin-input" placeholder="ตำแหน่ง (Founder/Member)">
        <input type="text" id="addFbDisplay" class="admin-input" placeholder="ชื่อ Facebook">
        <input type="text" id="addFbLink" class="admin-input" placeholder="ลิงก์ Facebook">
        <input type="text" id="addImg" class="admin-input" placeholder="URL รูปโปรไฟล์">
        <button class="admin-btn" onclick="saveData()" id="submitBtn">บันทึกข้อมูลเข้าฐานข้อมูล</button>
        <button onclick="resetForm()" id="cancelBtn" style="display:none; width:100%; background:none; border:none; color:var(--text-dim); margin-top:10px; cursor:pointer;">ยกเลิก</button>
    </div>

    <div id="loader" style="display:none;"><i class="fas fa-spinner fa-spin"></i> กำลังโหลดข้อมูลจากเซิร์ฟเวอร์...</div>
    <div class="member-grid" id="memberGrid"></div>

    <script>
        // ระบบกัน F12 / Ctrl+U
        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73) || (e.ctrlKey && e.keyCode == 85)) return false;
        };

        const API_URL = "https://script.google.com/macros/s/AKfycbyvWq8vNqgW8oIUZIVVle0luMap-Rmp1dIQtyFxMYicaP9RS3orkvsExWEHnv-POQdp9Q/exec";
        let allMembers = [], adminPassword = "", isAdmin = false, isEdit = false;

        function showLogin() { if(isAdmin) location.reload(); else document.getElementById('loginModal').style.display='flex'; }

        async function checkAuth() {
            const pass = document.getElementById('passInput').value;
            const loader = document.getElementById('loader');
            const errorText = document.getElementById('loginError');
            
            errorText.style.display = 'none';
            loader.style.display = 'block';

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login_and_get_data', password: pass })
                });
                const result = await res.json();

                if (result.status === "success") {
                    isAdmin = true;
                    adminPassword = pass;
                    allMembers = result.data;
                    document.getElementById('loginModal').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    render(allMembers);
                } else {
                    errorText.style.display = 'block';
                }
            } catch (e) { alert("การเชื่อมต่อขัดข้อง"); }
            loader.style.display = 'none';
        }

        function render(data) {
            const grid = document.getElementById('memberGrid');
            grid.innerHTML = '';
            data.forEach(m => {
                const avatar = m.image_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(m.name)}&background=333&color=fff`;
                grid.innerHTML += `
                    <div class="card">
                        <img src="${avatar}" class="avatar">
                        <div class="info">
                            <div style="color:var(--primary); font-size:0.75rem; font-weight:bold;">${m.gang || '-'}</div>
                            <div class="name">${m.name}</div>
                            <span class="badge">${m.role || 'Member'}</span>
                        </div>
                        <div class="action-group">
                            ${m.fb_link ? `<a href="${m.fb_link}" target="_blank" class="icon-btn fb-link" style="display:flex"><i class="fab fa-facebook-f"></i></a>` : ''}
                            <button class="icon-btn edit-btn" onclick="edit('${m.name}')" style="display:flex"><i class="fas fa-edit"></i></button>
                            <button class="icon-btn del-btn" onclick="del('${m.name}')" style="display:flex"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        window.edit = (name) => {
            const m = allMembers.find(x => x.name === name);
            isEdit = true;
            document.getElementById('formTitle').innerText = "แก้ไขข้อมูล: " + name;
            document.getElementById('addName').value = m.name;
            document.getElementById('addGang').value = m.gang;
            document.getElementById('addRole').value = m.role;
            document.getElementById('addFbDisplay').value = m.fb_display;
            document.getElementById('addFbLink').value = m.fb_link;
            document.getElementById('addImg').value = m.image_url;
            document.getElementById('cancelBtn').style.display = "block";
            window.scrollTo({top: 0, behavior: 'smooth'});
        };

        window.saveData = async () => {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "กำลังดำเนินการ..."; btn.disabled = true;
            const payload = {
                action: isEdit ? 'edit' : 'add',
                password: adminPassword,
                data: {
                    name: document.getElementById('addName').value,
                    gang: document.getElementById('addGang').value,
                    role: document.getElementById('addRole').value,
                    fb_display: document.getElementById('addFbDisplay').value,
                    fb_link: document.getElementById('addFbLink').value,
                    image_url: document.getElementById('addImg').value
                }
            };
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            location.reload();
        };

        window.del = async (name) => {
            if(confirm("ลบข้อมูล " + name + "?")) {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', name: name, password: adminPassword }) });
                location.reload();
            }
        };

        function resetForm() {
            isEdit = false;
            document.getElementById('formTitle').innerText = "เพิ่มชื่อใหม่";
            document.getElementById('adminPanel').querySelectorAll('input').forEach(i => i.value = "");
            document.getElementById('cancelBtn').style.display = "none";
        }
    </script>
</body>
</html>
