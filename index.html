<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robloxmapkradot</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-body: radial-gradient(circle at 50% -15%, #1a1b3a 0%, #050505 85%); --card-bg: #111111; --primary: #6366f1; --text-main: #ffffff; --text-dim: #a0a0a0; }
        body { background: var(--bg-body); color: var(--text-main); font-family: 'Kanit', sans-serif; margin: 0; min-height: 100vh; padding-bottom: 50px; user-select: none; }
        header { text-align: center; padding: 80px 20px 40px; }
        .main-title { font-family: 'Orbitron', sans-serif; font-size: clamp(2.5rem, 8vw, 4rem); margin: 0; text-transform: uppercase; letter-spacing: 4px; }
        .admin-trigger { position: fixed; bottom: 25px; left: 25px; width: 45px; height: 45px; background: rgba(255,255,255,0.1); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; z-index: 1000; }
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; }
        .login-card { background: var(--card-bg); padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: center; border: 1px solid var(--primary); }
        #adminPanel { display: none; background: var(--card-bg); max-width: 500px; margin: 0 auto 30px; padding: 25px; border-radius: 20px; border: 2px solid var(--primary); }
        .admin-input { width: 100%; box-sizing: border-box; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; font-family: 'Kanit'; }
        .admin-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
        .member-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 20px; display: flex; align-items: center; border: 1px solid #222; position: relative; }
        .avatar { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; margin-right: 15px; background: #222; }
        .action-group { display: flex; flex-direction: column; gap: 6px; }
        .icon-btn { width: 35px; height: 35px; border-radius: 10px; display: none; align-items: center; justify-content: center; border: none; cursor: pointer; color: white; text-decoration: none; }
        .fb-link { background: #1877f2; display: flex; }
        .edit-btn { background: #f1c40f; }
        .del-btn { background: #ff4757; }
        #loader { text-align: center; padding: 50px; font-size: 1.5rem; color: var(--primary); }
    </style>
</head>
<body oncontextmenu="return false;">

    <button class="admin-trigger" onclick="openLogin()"><i class="fas fa-lock"></i></button>

    <div class="modal-overlay" id="loginModal">
        <div class="login-card">
            <h2 style="font-family:'Orbitron'; color:var(--primary);">ADMIN LOGIN</h2>
            <input type="password" id="passInput" class="admin-input" placeholder="กรอกรหัสผ่าน..." style="text-align:center;">
            <button class="admin-btn" id="loginConfirmBtn" onclick="checkAuth()">ยืนยัน</button>
            <button onclick="document.getElementById('loginModal').style.display='none'" style="background:none; border:none; color:var(--text-dim); margin-top:10px; cursor:pointer;">ยกเลิก</button>
        </div>
    </div>

    <header><h1 class="main-title">Member List</h1></header>

    <div id="adminPanel">
        <div id="formTitle" style="font-weight:bold; color:var(--primary); margin-bottom:15px; text-align:center;">ADMIN PANEL</div>
        <input type="text" id="addName" class="admin-input" placeholder="ชื่อเล่น">
        <input type="text" id="addGang" class="admin-input" placeholder="แก๊ง">
        <input type="text" id="addRole" class="admin-input" placeholder="ตำแหน่ง">
        <input type="text" id="addFbDisplay" class="admin-input" placeholder="ชื่อเฟส">
        <input type="text" id="addFbLink" class="admin-input" placeholder="ลิงก์เฟส">
        <input type="text" id="addImg" class="admin-input" placeholder="ลิงก์รูป">
        <button class="admin-btn" onclick="saveData()" id="submitBtn">บันทึกข้อมูล</button>
    </div>

    <div id="loader"><i class="fas fa-spinner fa-spin"></i></div>
    <div class="member-grid" id="memberGrid"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxWpWXFH26mrxKDt17zGV62QtBziN8G4jt0GsHbXL6fxQBkOygFptorQQp2pTyOHQ40tw/exec";
        let allMembers = [], adminPassword = "", isAdmin = false, isEdit = false;

        async function load() {
            const res = await fetch(API_URL);
            allMembers = await res.json();
            document.getElementById('loader').style.display = 'none';
            render(allMembers);
        }

        function openLogin() { document.getElementById('loginModal').style.display = 'flex'; }

        // ฟังก์ชันเช็ครหัสผ่าน โดยส่งไปถาม Google Apps Script
        async function checkAuth() {
            const p = document.getElementById('passInput').value;
            const btn = document.getElementById('loginConfirmBtn');
            btn.innerText = "กำลังตรวจสอบ..."; btn.disabled = true;

            // ลองส่งคำสั่งปลอมๆ ไปพร้อมรหัสผ่านเพื่อเช็คว่ารหัสถูกไหม
            const res = await fetch(API_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: 'check', password: p }) 
            });
            const result = await res.json();

            if(result.status !== "wrong_pass") {
                isAdmin = true; adminPassword = p;
                document.getElementById('loginModal').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                render(allMembers);
            } else { 
                alert("รหัสผ่านไม่ถูกต้อง!"); 
                btn.innerText = "ยืนยัน"; btn.disabled = false;
            }
        }

        function render(data) {
            const grid = document.getElementById('memberGrid');
            grid.innerHTML = '';
            data.forEach(m => {
                grid.innerHTML += `
                    <div class="card">
                        <img src="${m.image_url || 'https://via.placeholder.com/80'}" class="avatar">
                        <div class="info">
                            <div style="color:var(--primary); font-size:0.7rem;">${m.gang}</div>
                            <div style="font-weight:600;">${m.name}</div>
                            <div style="font-size:0.8rem; color:var(--text-dim);">${m.role}</div>
                        </div>
                        <div class="action-group">
                            <a href="${m.fb_link}" target="_blank" class="icon-btn fb-link" style="display:flex"><i class="fab fa-facebook-f"></i></a>
                            <button class="icon-btn edit-btn" onclick="edit('${m.name}')" style="display:${isAdmin?'flex':'none'}"><i class="fas fa-edit"></i></button>
                            <button class="icon-btn del-btn" onclick="del('${m.name}')" style="display:${isAdmin?'flex':'none'}"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        }

        window.edit = (name) => {
            const m = allMembers.find(x => x.name === name);
            isEdit = true;
            document.getElementById('addName').value = m.name;
            document.getElementById('addGang').value = m.gang;
            document.getElementById('addRole').value = m.role;
            document.getElementById('addFbDisplay').value = m.fb_display;
            document.getElementById('addFbLink').value = m.fb_link;
            document.getElementById('addImg').value = m.image_url;
            window.scrollTo(0,0);
        };

        window.saveData = async () => {
            const btn = document.getElementById('submitBtn');
            btn.innerText = "กำลังบันทึก..."; btn.disabled = true;
            const payload = {
                action: isEdit ? 'edit' : 'add', password: adminPassword,
                data: { name: document.getElementById('addName').value, gang: document.getElementById('addGang').value, role: document.getElementById('addRole').value, fb_display: document.getElementById('addFbDisplay').value, fb_link: document.getElementById('addFbLink').value, image_url: document.getElementById('addImg').value }
            };
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            location.reload();
        };

        window.del = async (n) => {
            if(confirm("ลบรายชื่อนี้ใช่ไหม?")) {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', name: n, password: adminPassword }) });
                location.reload();
            }
        };

        load();
    </script>
</body>
</html>
